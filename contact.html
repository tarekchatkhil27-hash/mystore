<!DOCTYPE html>
<html lang="bn" class="lang-bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>

<title>যোগাযোগ | Smart Supper Shop</title>

<style>
:root{
  --primary:#4F46E5;--primary-dark:#3730A3;--accent:#F43F5E;
  --success:#10B981;--wa:#25D366;--bg:#FAFAFA;--surface:#fff;
  --surface2:#F3F4F6;--text:#111827;--text2:#6B7280;--muted:#9CA3AF;
  --border:#E5E7EB;--font:'Tiro Bangla',serif;--hh:56px;--nh:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  padding-bottom:calc(var(--nh)+20px);-webkit-font-smoothing:antialiased}
.lang-en *{font-family:'Times New Roman',Times,serif}
.lang-bn *{font-family:'Tiro Bangla',serif}
a{text-decoration:none;color:inherit}
button{border:none;background:none;cursor:pointer;font-family:inherit}
img{max-width:100%;display:block}
.tap{-webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .12s}
.tap:active{transform:scale(.96);opacity:.82}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .42s ease both}

/* Header */
#hdr{position:sticky;top:0;z-index:900;height:var(--hh);
  background:rgba(255,255,255,.93);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.07)}
.hi{display:flex;align-items:center;padding:0 12px;height:100%;
  max-width:480px;margin:0 auto;gap:8px}
.ib{width:38px;height:38px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.ib:active{background:var(--surface2)}
.ib svg{width:20px;height:20px}
.ht{flex:1;font-size:1rem;font-weight:700}
.ltb{height:28px;padding:0 11px;border-radius:999px;background:var(--primary);
  color:#fff;font-size:.7rem;font-weight:700;
  font-family:'Tiro Bangla','Times New Roman',serif;
  transition:transform .15s;flex-shrink:0}
.ltb:active{transform:scale(.9)}

/* Page wrapper */
.pw{max-width:480px;margin:0 auto;padding:16px 14px 0}

/* WhatsApp button */
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;height:56px;background:var(--wa);color:#fff;
  border-radius:16px;font-size:1rem;font-weight:700;
  font-family:var(--font);margin-bottom:16px;
  box-shadow:0 4px 16px rgba(37,211,102,.35);
  transition:transform .15s,box-shadow .15s}
.wa-btn:active{transform:scale(.97);box-shadow:none}
.wa-btn svg{width:22px;height:22px;flex-shrink:0}

/* Info cards */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.info-card{background:var(--surface);border-radius:16px;
  padding:16px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06);
  border:1px solid var(--border)}
.info-icon{font-size:1.4rem;margin-bottom:8px}
.info-label{font-size:.7rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.info-value{font-size:.82rem;font-weight:600;color:var(--text);line-height:1.45}
.info-value a{color:var(--primary)}

/* Contact form */
.form-card{background:var(--surface);border-radius:20px;
  padding:20px 16px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px}
.form-title{font-size:.88rem;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:5px}
.fi{width:100%;height:46px;border:1.5px solid var(--border);
  border-radius:10px;padding:0 13px;font-size:.9rem;
  font-family:var(--font);color:var(--text);background:var(--surface);
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.fi.err{border-color:var(--accent);box-shadow:0 0 0 3px rgba(244,63,94,.08)}
textarea.fi{height:100px;padding:11px 13px;resize:none;line-height:1.55}
.fe{font-size:.72rem;color:var(--accent);margin-top:3px;font-weight:500;display:none}
.fe.show{display:block}

/* Submit button */
.sub-btn{width:100%;height:50px;background:var(--primary);color:#fff;
  border-radius:14px;font-size:.97rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font);
  box-shadow:0 4px 14px rgba(79,70,229,.3);
  transition:background .18s,transform .12s,box-shadow .15s}
.sub-btn:active{transform:scale(.97);background:var(--primary-dark);box-shadow:none}
.sub-btn:disabled{background:var(--border);color:var(--muted);
  box-shadow:none;cursor:not-allowed}
.sub-btn svg{width:18px;height:18px}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;
  animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Bottom nav */
#bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);
  display:flex;align-items:stretch;z-index:800;
  box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;color:var(--muted);font-size:.6rem;
  font-weight:600;position:relative;padding:6px 0;
  font-family:var(--font);-webkit-tap-highlight-color:transparent}
.nt:active{background:var(--surface2)}
.nt.active{color:var(--primary)}
.nt svg{width:22px;height:22px}
.ni{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:3px;background:var(--primary);
  border-radius:0 0 4px 4px;opacity:0;transition:opacity .2s}
.nt.active .ni{opacity:1}
.cb{position:relative;display:inline-block}
.cart-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;
  padding:0 4px;border-radius:999px;background:var(--accent);color:#fff;
  font-size:.58rem;font-weight:700;display:inline-flex;
  align-items:center;justify-content:center}
.cart-badge[data-count="0"]{display:none}
</style>

<script>
var _sending = false;

var t  = function(k,v){ return window.i18n ? window.i18n.t(k,v) : k; };
var gl = function(){ return window.utils ? window.utils.getLang() : 'bn'; };

function validate() {
  var ok = true;
  var name = document.getElementById('cn');
  var msg  = document.getElementById('cm');
  var errN = document.getElementById('err-cn');
  var errM = document.getElementById('err-cm');

  if (!name.value.trim()) {
    name.classList.add('err'); errN.classList.add('show'); ok = false;
  } else {
    name.classList.remove('err'); errN.classList.remove('show');
  }
  if (!msg.value.trim()) {
    msg.classList.add('err'); errM.classList.add('show'); ok = false;
  } else {
    msg.classList.remove('err'); errM.classList.remove('show');
  }
  return ok;
}

['cn','cm'].forEach(function(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', function() {
    this.classList.remove('err');
    var map = { cn:'err-cn', cm:'err-cm' };
    var er = document.getElementById(map[id]);
    if (er) er.classList.remove('show');
  });
});

async function sendMessage() {
  if (_sending) return;
  if (!validate()) return;

  _sending = true;
  var btn  = document.getElementById('sub-btn');
  var spin = document.getElementById('sub-spin');
  var icon = document.getElementById('sub-icon');
  var lbl  = document.getElementById('sub-lbl');

  btn.disabled       = true;
  spin.style.display = 'block';
  icon.style.display = 'none';
  lbl.textContent    = gl() === 'bn' ? 'পাঠানো হচ্ছে...' : 'Sending...';

  if (!window.supabase) {
    await new Promise(function(r) {
      window.addEventListener('supabaseReady', r, { once: true });
    });
  }

  try {
    var payload = {
      name:    document.getElementById('cn').value.trim(),
      email:   document.getElementById('ce').value.trim() || null,
      phone:   document.getElementById('cp').value.trim() || null,
      subject: document.getElementById('cs').value.trim() || null,
      message: document.getElementById('cm').value.trim()
    };

    var res = await window.supabase.from('contact_messages').insert(payload);
    if (res.error) throw res.error;

    // Success
    if (window.utils) window.utils.showToast(t('message_sent'), 'success');

    // Reset form
    ['cn','ce','cp','cs','cm'].forEach(function(id) {
      document.getElementById(id).value = '';
    });

    // Button success state
    spin.style.display = 'none';
    icon.style.display = 'block';
    lbl.textContent    = t('message_sent');
    setTimeout(function() {
      btn.disabled    = false;
      lbl.setAttribute('data-i18n','send_message');
      lbl.textContent = t('send_message');
      _sending = false;
    }, 3000);

  } catch (err) {
    console.error('sendMessage:', err);
    spin.style.display = 'none';
    icon.style.display = 'block';
    lbl.setAttribute('data-i18n','send_message');
    lbl.textContent    = t('send_message');
    btn.disabled       = false;
    _sending           = false;
    if (window.utils) window.utils.showToast(
      gl() === 'bn'
        ? 'বার্তা পাঠানো যায়নি। আবার চেষ্টা করুন।'
        : 'Could not send message. Please try again.',
      'error'
    );
  }
}

window.addEventListener('languageChanged', function(e) {
  var lang = e.detail ? e.detail.lang : gl();
  var locEl = document.getElementById('loc-val');
  if (locEl) locEl.textContent = lang === 'bn' ? 'ঢাকা, বাংলাদেশ' : 'Dhaka, Bangladesh';
});

document.addEventListener('DOMContentLoaded', function() {
  var lang = localStorage.getItem('lang') || 'bn';
  if (window.i18n) window.i18n.setLanguage(lang);
  if (window.cart) window.cart.renderCartBadge();
  var locEl = document.getElementById('loc-val');
  if (locEl) locEl.textContent = lang === 'bn' ? 'ঢাকা, বাংলাদেশ' : 'Dhaka, Bangladesh';
});
</script>
